name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check infra exists
        id: check-infra
        run: |
          if [ -f "infra/task-definition.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping deploy - infra/task-definition.json not found"
          fi

      - name: Configure AWS credentials
        if: steps.check-infra.outputs.exists == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: steps.check-infra.outputs.exists == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        if: steps.check-infra.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        if: steps.check-infra.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-${{ hashFiles('Dockerfile', 'bun.lock') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Build and push image to Amazon ECR
        if: steps.check-infra.outputs.exists == 'true'
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: blerp-api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        if: steps.check-infra.outputs.exists == 'true'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/task-definition.json
          container-name: blerp-api
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        if: steps.check-infra.outputs.exists == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: blerp-api-service
          cluster: blerp-cluster
          wait-for-service-stability: true

      - name: Move Docker cache
        if: steps.check-infra.outputs.exists == 'true'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Deploy skipped
        if: steps.check-infra.outputs.exists != 'true'
        run: |
          echo "Deploy was skipped because infrastructure files are not configured."
          echo "To enable deployments:"
          echo "1. Create infra/task-definition.json with your ECS task definition"
          echo "2. Add AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets"
          echo "3. Create ECR repository named 'blerp-api'"
